<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVFU Campus DMS - Login</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Using your library.jpg as a full-screen cover background */
            background:
				linear-gradient(
					rgba(0,0,0,0.15),
					rgba(0,0,0,0.15)
				),
				url("{{ url_for('static', filename='images/library.png') }}")
		no-repeat center center fixed;

background-size: cover;
            background-size: cover;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            width: 420px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .brand-section {
            margin-bottom: 25px;
        }

        .brand-section h1 {
            font-size: 28px;
            color: #1e293b;
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .brand-section p {
            color: #64748b;
            font-size: 13px;
            margin: 5px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 {
            color: #334155;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Input Container Fields */
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            background-color: #f8fafc;
            color: #1e293b;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus, 
        input[type="password"]:focus {
            border-color: #2c3e50;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.15);
        }

        /* Styled Submit Button */
        button {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #1a242f;
        }

        /* Flash Message Styling */
        .alert-message {
            background-color: #e0f5f1;
            color: #991b1b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fca5a5;
            text-align: left;
        }

        /* Footer Links Layout */
        .footer-links {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .footer-links a {
            color: #475569;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #2c3e50;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-card">
    
    <div class="brand-section">
        <h1>AVFU DMS</h1>
        <p>Document Management System</p>
    </div>

    <h2>Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert-message">
                    ⚠️ {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/" method="POST">
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="text" id="email" name="email" placeholder="yourname@avfu.ac.in" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="footer-links">
		<a>
			Forgot Password? 
			<br>
			email : rasel.ahmed@avfu.ac.in
		</a>

		<a href="/register">New User? Register</a>
	</div>

</div>

</body>
</html>
