
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVFU Campus DMS - Register</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background:
                linear-gradient(
                    rgba(0, 0, 0, 0.15),
                    rgba(0, 0, 0, 0.15)
                ),
                url("{{ url_for('static', filename='images/library.png') }}")
                no-repeat center center fixed;

            background-size: cover;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.98);
            width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.25);
            text-align: center;
        }

        .brand-section {
            margin-bottom: 25px;
        }

        .brand-section h1 {
            font-size: 28px;
            color: #1e293b;
            margin: 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .brand-section p {
            color: #64748b;
            font-size: 13px;
            margin: 5px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 {
            color: #334155;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            background-color: #f8fafc;
            color: #1e293b;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #2c3e50;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.15);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #1a242f;
        }

        .alert-message {
            background-color: #e0f5f1;
            color: #991b1b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fca5a5;
            text-align: left;
        }

        .success-message {
            background-color: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #86efac;
            text-align: left;
        }

        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
        }

        .footer-links a {
            color: #475569;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: #2c3e50;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="register-card">

    <div class="brand-section">
        <h1>AVFU DMS</h1>
        <p>Document Management System</p>
    </div>

    <h2>Create Account</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="{% if category == 'success' %}success-message{% else %}alert-message{% endif %}">
                    ⚠️ {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="/register" method="POST">

        <div class="input-group">
            <label for="email">Email Address</label>
            <input
                type="text"
                id="email"
                name="email"
                placeholder="yourname@avfu.ac.in"
                required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Create Password"
                required>
        </div>

        <div class="input-group">
            <label for="confirm">Confirm Password</label>
            <input
                type="password"
                id="confirm"
                name="confirm"
                placeholder="Confirm Password"
                required>
        </div>

        <button type="submit">Register</button>

    </form>

    <div class="footer-links">
        <a href="/">← Back to Login</a>
    </div>

</div>

</body>
</html>
